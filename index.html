<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Minesweeper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="menu" class="menu show">
    <h1>Minesweeper</h1>

    <div class="menu-section">
      <button class="sizeBtn" data-size="small">Small </button>
      <button class="sizeBtn" data-size="medium">Medium </button>
      <button class="sizeBtn" data-size="large">Large </button>
    </div>

    <div id="menuMessage"></div>
  </div>

  <div id="board"></div>
  <div id="status"></div>
  <div id="hud">
  <div id="mineCounter">Mines: 0</div>
  <div id="timer">Time: 0</div>
</div>


  <script src="javascript.js"></script>
</body>

</html>
