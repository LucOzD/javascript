<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Minesweeper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="menu" class="menu">
    <h1>Minesweeper</h1>

    <div class="menu-section">
      <label>Rows: <input type="number" id="rows" value="10" min="5" max="30"></label>
      <label>Cols: <input type="number" id="cols" value="10" min="5" max="30"></label>
      <label>Mines: <input type="number" id="mines" value="15" min="1" max="400"></label>
    </div>

    <button id="startGame">Start Game</button>
    <div id="menuMessage"></div>
  </div>

  <div id="board"></div>
  <div id="status"></div>

  <script src="javascript.js"></script>
</body>

</html>
