<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake Game</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #222;
    margin: 0;
    height: 100vh;
    justify-content: center;
    color: #0f0;
    font-family: Arial, sans-serif;
  }

  #scoreboard {
    font-size: 22px;
    margin-bottom: 10px;
  }

  canvas {
    background: #111;
    border: 2px solid #0f0;
  }

  #deathMenu {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(20, 20, 20, 0.95);
    border: 2px solid #0f0;
    padding: 20px 40px;
    text-align: center;
    display: none;
  }

  #deathMenu button {
    margin-top: 15px;
    padding: 10px 20px;
    background: #0f0;
    border: none;
    cursor: pointer;
    font-size: 18px;
  }
</style>
</head>
<body>

<div id="scoreboard">Score: 0 | High Score: 0</div>

<canvas id="game" width="400" height="400"></canvas>

<div id="deathMenu">
  <h2>You Died!</h2>
  <p id="finalScore"></p>
  <button onclick="respawn()">Respawn</button>
</div>

<script src="javascript.js"></script>
</body>
</html>
