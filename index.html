<!DOCTYPE html>
<html>
<head>
    <title>Wall Dodger</title>
    <style>
        body {
            background-color: #111;
            color: #0f0;
            font-family: monospace;
            text-align: center;
        }
        #gameArea {
            position: relative;
            width: 800px;
            height: 600px;
            background: #222;
            margin: auto;
            overflow: hidden;
            border: 3px solid #0f0;
        }
        #player {
            position: absolute;
            width: 60px;
            height: 60px;
        }
        .wall {
            position: absolute;
            background: #f00;
        }
    </style>
</head>
<body>

<h1>Wall Dodger</h1>
<p>Use arrow keys to rotate + thrust</p>
<p>Score: <span id="score">0</span></p>
<p>High Score: <span id="highScore">0</span></p>

<div id="gameArea">
    <img id="player" src="me.png">
</div>

<script src="javascript.js"></script>

</body>
</html>
