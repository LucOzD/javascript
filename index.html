<!DOCTYPE html>
<html>
<head>
    <title>Infinite Chase</title>
    <style>
        body {
            background: #111;
            color: rgb(0, 89, 255);
            font-family: monospace;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        #gameArea {
            position: relative;
            width: 800px;
            height: 600px;
            background: #222;
            margin: 20px auto;
            overflow: hidden;
            border: 3px solid #0f0;
        }

        #player, #enemy {
            position: absolute;
            width: 60px;
            height: 60px;
        }

        #pointer {
            position: absolute;
            width: 40px;
            height: 40px;
            display: none;
        }
         #background {
          position: absolute;
          width: 2000px;
         height: 2000px;
           left: -600px;
          top: -700px;
     
          background-repeat: repeat;
            opacity: 0.25; /* optional, looks nice */
          pointer-events: none;
        }
.chunk {
    position: absolute;
    z-index: 0 !important;
    opacity: 1 !important;
}
#player, #enemy, #pointer {
    position: absolute;
    z-index: 1000 !important;
}

        
    </style>
</head>
<body>

<h1>Infinite Chase</h1>
<p>WASD to move — survive as long as possible</p>
<p>Score: <span id="score">0</span></p>
<p>High Score: <span id="highScore">0</span></p>

<div id="gameArea">
  <div id="background"></div>

    <img id="player" src="me.png">
    <img id="enemy" src="cris.png">
    <img id="pointer" src="pointer.png">
</div>

<script src="javascript.js"></script>

</body>
</html>
