<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Minesweeper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="menu" class="menu show">
    <h1>Minesweeper</h1>

    <div class="menu-section">
      <button class="sizeBtn" data-size="small">Easy </button>
      <button class="sizeBtn" data-size="medium">Medium </button>
      <button class="sizeBtn" data-size="large">Hard </button>

      <div id="leaderboards">
  <h2>Leaderboards</h2>

  <div class="lb-section">
    <h3>Small</h3>
    <ul id="lb-small"></ul>
  </div>

  <div class="lb-section">
    <h3>Medium</h3>
    <ul id="lb-medium"></ul>
  </div>

  <div class="lb-section">
    <h3>Large</h3>
    <ul id="lb-large"></ul>
  </div>
</div>

    </div>

    <div id="menuMessage"></div>
  </div>

  <div id="board"></div>
  <div id="status"></div>
  <div id="hud">
  <div id="mineCounter">Mines: 0</div>
  <div id="timer">Time: 0</div>
</div>


  <script src="javascript.js"></script>
</body>

</html>
